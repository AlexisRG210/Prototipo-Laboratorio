            <h1>REGISTRO DE ALTAS DE ALMACÉN</h1>

            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('material-sec', this)">
                    <i data-lucide="box" style="width:16px; height:16px;"></i> Materiales
                </button>
                <button class="tab-btn" onclick="switchTab('reactivo-sec', this)">
                    <i data-lucide="test-tube" style="width:16px; height:16px;"></i> Reactivos
                </button>
            </div>

            <div id="material-sec" class="form-section active">
                <form name="formMat" method="POST" action="../php/AgregarMat.php">
                    <div class="divFormulario" style="width:100%;">
                        <section class="formulario">
                            <h2 class="titulos">NUEVO MATERIAL</h2>
                            <input class="controles" type="text" name="claveM" id="claveM" required placeholder="Clave del componente">
                            <input class="controles" type="text" name="nombre" id="nombreM" required placeholder="Nombre o descripción">
                            <input class="controles" type="text" name="presentacion" id="presentacion" required placeholder="Presentación (Ej: Caja/Pza)">
                            <input class="controles" type="number" name="cantidad" id="cantidadM" required min="1" placeholder="Cantidad de stock inicial">
                            
                            <div class="BtnAceptar">
                                <button type="submit" class="botonAceptar">Dar de Alta</button>
                            </div>
                            <div class="BtnBorar">
                                <input class="botonesBorar" type="reset" value="Limpiar">
                            </div>
                        </section>
                    </div>
                </form>
            </div>

            <div id="reactivo-sec" class="form-section">
                <form name="formReac" method="POST" action="../php/AgregarReac.php">

                        <section class="formulario2">
                            <h2 class="titulos">NUEVO REACTIVO</h2>
                            <input class="controle2" type="text" name="claveR" id="claveR" required placeholder="Clave del reactivo químico">
                            <input class="controle2" type="text" name="nombre" id="nombreR" required placeholder="Nombre de la sustancia">
                            <input class="controle2" type="number" name="envases" id="envases" required min="1" placeholder="Número de envases">
                            <input class="controle2" type="number" name="cantidad" id="cantidadR" required min="1" placeholder="Volumen/Masa total">
                            <input class="controle2" type="text" name="unidades" id="unidades" required placeholder="Unidad de medida (gr / ml)">

                            </div>

                            </div>
                        </section>
                    </div>
                </form>

    <script>
        lucide.createIcons();

        function switchTab(sectionId, element) {
            document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            element.classList.add('active');
        }
    </script>
